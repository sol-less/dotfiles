#############
### LOOKS ###
#############

source = ~/.config/hypr/configs/settings/colors.conf

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2

    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 10
        render_power = 11
        color = rgba(1a1a1aff)
    }

    blur {
        enabled = true
        size = 3
        passes = 5
				xray = false
        ignore_opacity = true
     }

}

