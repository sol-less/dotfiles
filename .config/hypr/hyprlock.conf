$font = Google Sans Bold 12 
$font2 = Google Sans 12 
$testText = test

general {
    hide_cursor = true 
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1

    animation = fadeIn,         1, 5, easeInOutCubic
    animation = fadeOut,        1, 5, easeInOutCubic
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =
    size = 5%, 5%
    outline_thickness = 2
    both_size = 20
    inner_color = rgba(255, 255, 255, 0.05) # no fill
    

    outer_color = rgba(255, 255, 255, 0.46)
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 4

    font_family = $font
    placeholder_text = $GREET
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    #dots_text_format = -
    #dots_size = 0.4
    #dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    hide_input = true

    position = -20, 20
    halign = right
    valign = bottom
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 50
    font_family = $font

    position = 0, 25
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 15
    font_family = $font2

    position = 0, -25
    halign = center
    valign = center
}
